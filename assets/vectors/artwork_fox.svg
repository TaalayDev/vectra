<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
        
        <!-- Definitions -->
        <defs>
            <!-- Glowing Moon Gradient -->
            <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fef08a" stop-opacity="1" />
                <stop offset="30%" stop-color="#fef08a" stop-opacity="0.8" />
                <stop offset="60%" stop-color="#818cf8" stop-opacity="0.2" />
                <stop offset="100%" stop-color="#312e81" stop-opacity="0" />
            </radialGradient>

            <!-- Firefly Glow Filter -->
            <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>

            <!-- Clip Path for the white tip of the tail -->
            <clipPath id="tailClip">
                <path d="M 250 380 C 330 420, 390 280, 340 180 C 300 110, 250 160, 280 220 C 300 260, 300 340, 250 380 Z" />
            </clipPath>
        </defs>

        <!-- Background & Atmosphere -->
        <!-- Glowing Moon -->
        <circle cx="200" cy="220" r="150" fill="url(#moonGlow)" />
        
        <!-- Stars -->
        <circle cx="60" cy="80" r="1.5" fill="#fff" class="star" style="animation-delay: 0.2s" />
        <circle cx="320" cy="60" r="2" fill="#fff" class="star" style="animation-delay: 1.5s" />
        <circle cx="280" cy="120" r="1" fill="#fff" class="star" style="animation-delay: 0.8s" />
        <circle cx="90" cy="150" r="1.5" fill="#fff" class="star" style="animation-delay: 2.1s" />
        <circle cx="360" cy="200" r="2" fill="#fff" class="star" style="animation-delay: 1.1s" />

        <!-- Silhouetted Forest Trees -->
        <polygon points="10,400 40,240 70,400" fill="#022c22" opacity="0.6"/>
        <polygon points="50,400 80,180 110,400" fill="#022c22" opacity="0.4"/>
        <polygon points="320,400 350,220 380,400" fill="#022c22" opacity="0.5"/>
        <polygon points="360,400 390,260 420,400" fill="#022c22" opacity="0.7"/>

        <!-- Curving Ground -->
        <path d="M -50 400 Q 200 370 450 400 L 450 500 L -50 500 Z" fill="#064e3b" />
        <ellipse cx="200" cy="400" rx="120" ry="15" fill="#022c22" opacity="0.4" /> <!-- Fox Drop Shadow -->

        <!-- The Fox -->
        <!-- Fox Tail (Rendered behind the body) -->
        <g class="tail">
            <!-- Main Orange Tail -->
            <path d="M 250 380 C 330 420, 390 280, 340 180 C 300 110, 250 160, 280 220 C 300 260, 300 340, 250 380 Z" fill="#ea580c" />
            <!-- White Fluffy Tip (clipped to the tail shape) -->
            <circle cx="320" cy="180" r="45" fill="#fffaf0" clip-path="url(#tailClip)" />
        </g>

        <!-- Fox Back Legs (Darker orange for depth) -->
        <ellipse cx="140" cy="360" rx="28" ry="38" fill="#c2410c" />
        <ellipse cx="130" cy="395" rx="14" ry="8" fill="#1c1917" /> <!-- Left Back Paw -->
        
        <ellipse cx="260" cy="360" rx="28" ry="38" fill="#c2410c" />
        <ellipse cx="270" cy="395" rx="14" ry="8" fill="#1c1917" /> <!-- Right Back Paw -->

        <!-- Animated Chest/Body Group -->
        <g class="chest">
            <!-- Main Orange Torso -->
            <polygon points="160,260 240,260 265,390 135,390" fill="#ea580c" />
            <!-- White Fluffy Chest -->
            <polygon points="160,260 240,260 220,330 200,360 180,330" fill="#fffaf0" />
            
            <!-- Front Legs -->
            <rect x="174" y="330" width="14" height="60" rx="7" fill="#ea580c" />
            <rect x="174" y="375" width="14" height="15" rx="5" fill="#1c1917" /> <!-- Left Front Paw -->
            
            <rect x="212" y="330" width="14" height="60" rx="7" fill="#ea580c" />
            <rect x="212" y="375" width="14" height="15" rx="5" fill="#1c1917" /> <!-- Right Front Paw -->
        </g>

        <!-- Animated Head Group -->
        <g class="head-group">
            
            <!-- Ears -->
            <g class="ear-l">
                <polygon points="110,200 140,90 170,180" fill="#ea580c" />
                <polygon points="120,180 140,110 155,180" fill="#fbcfe8" />
            </g>
            <g class="ear-r">
                <polygon points="290,200 260,90 230,180" fill="#ea580c" />
                <polygon points="280,180 260,110 245,180" fill="#fbcfe8" />
            </g>

            <!-- Main Head/Cranium (Orange) -->
            <path d="M 120 200 Q 200 180 280 200 L 200 280 Z" fill="#ea580c" />
            
            <!-- Fluffy White Muzzle/Cheeks -->
            <path d="M 120 200 C 130 250, 170 280, 200 280 C 230 280, 270 250, 280 200 C 240 230, 160 230, 120 200 Z" fill="#fffaf0" />

            <!-- Sleeping Eyes (Curved strokes) -->
            <path d="M 140 230 Q 155 245 170 230" fill="none" stroke="#1c1917" stroke-width="4" stroke-linecap="round" />
            <path d="M 230 230 Q 245 245 260 230" fill="none" stroke="#1c1917" stroke-width="4" stroke-linecap="round" />

            <!-- Cute Black Nose -->
            <circle cx="200" cy="285" r="7" fill="#1c1917" />
            
            <!-- Zzz Sleeping Text Bubbles -->
            <text x="130" y="180" class="zzz z1">Z</text>
            <text x="145" y="160" class="zzz z2">z</text>
            <text x="155" y="145" class="zzz z3">z</text>
        </g>

        <!-- Magical Fireflies -->
        <circle cx="120" cy="380" r="3.5" fill="#bef264" class="firefly f1" filter="url(#glow)" />
        <circle cx="300" cy="360" r="2.5" fill="#bef264" class="firefly f2" filter="url(#glow)" />
        <circle cx="240" cy="420" r="4"   fill="#bef264" class="firefly f3" filter="url(#glow)" />
        <circle cx="80"  cy="350" r="3"   fill="#bef264" class="firefly f4" filter="url(#glow)" />

    </svg>