<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" class="w-[500px] max-w-[90vw] h-auto overflow-visible">
            <g transform="translate(25, 0)">
                
                <!-- Floor shadow to ground the cat -->
                <ellipse cx="150" cy="250" rx="90" ry="15" fill="rgba(0,0,0,0.1)" />

                <!-- ================= TAIL (Behind the body) ================= -->
                    <path class="cat-tail" d="M 180,220 C 260,240 290,130 240,100 C 210,80 230,150 250,150" 
                          fill="none" stroke="#FF9A00" stroke-width="20" stroke-linecap="round"/>
                    
                    <!-- Tail Stripes -->
                    <g class="cat-tail">
                        <path d="M 245,105 L 255,120" stroke="#D35400" stroke-width="4" stroke-linecap="round"/>
                        <path d="M 265,135 L 275,150" stroke="#D35400" stroke-width="4" stroke-linecap="round"/>
                        <path d="M 270,170 L 250,180" stroke="#D35400" stroke-width="4" stroke-linecap="round"/>
                    </g>

                    <!-- ================= BACK PAWS / HAUNCHES ================= -->
                    <!-- Left Haunch -->
                    <ellipse cx="90" cy="220" rx="20" ry="30" fill="#E68A00" transform="rotate(-20 90 220)" />
                    <!-- Right Haunch -->
                    <ellipse cx="210" cy="220" rx="20" ry="30" fill="#E68A00" transform="rotate(20 210 220)" />


                    <!-- ================= MAIN BODY ================= -->
                    <!-- A smooth, slightly bell-shaped curve for a sitting cat -->
                    <path d="M 95,245 C 95,150 130,130 150,130 C 170,130 205,150 205,245 Z" fill="#FF9A00" />
                    
                    <!-- Lighter Belly Patch -->
                    <path d="M 115,245 C 115,180 135,160 150,160 C 165,160 185,180 185,245 Z" fill="#FFF3E0" />


                    <!-- ================= HEAD & EARS ================= -->
                    <!-- Left Ear -->
                    <polygon points="110,85 85,30 135,65" fill="#FF9A00" stroke="#FF9A00" stroke-width="2" stroke-linejoin="round"/>
                    <!-- Left Inner Ear -->
                    <polygon points="108,80 93,42 128,66" fill="#FFB6C1" />
                    
                    <!-- Right Ear -->
                    <polygon points="190,85 215,30 165,65" fill="#FF9A00" stroke="#FF9A00" stroke-width="2" stroke-linejoin="round"/>
                    <!-- Right Inner Ear -->
                    <polygon points="192,80 207,42 172,66" fill="#FFB6C1" />

                    <!-- Main Head Shape -->
                    <ellipse cx="150" cy="110" rx="50" ry="45" fill="#FF9A00" />

                    <!-- Head Stripes (Classic Tabby 'M') -->
                    <path d="M 135,65 L 142,80 L 150,65 L 158,80 L 165,65" fill="none" stroke="#D35400" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
                    
                    <!-- Cheek Stripes Left -->
                    <line x1="105" y1="105" x2="115" y2="110" stroke="#D35400" stroke-width="3" stroke-linecap="round"/>
                    <line x1="102" y1="115" x2="112" y2="118" stroke="#D35400" stroke-width="3" stroke-linecap="round"/>
                    
                    <!-- Cheek Stripes Right -->
                    <line x1="195" y1="105" x2="185" y2="110" stroke="#D35400" stroke-width="3" stroke-linecap="round"/>
                    <line x1="198" y1="115" x2="188" y2="118" stroke="#D35400" stroke-width="3" stroke-linecap="round"/>


                    <!-- ================= FACE DETAILS ================= -->
                    <!-- Left Eye Group -->
                    <g class="eye-left">
                        <!-- Eye Whites -->
                        <circle cx="125" cy="100" r="12" fill="#FFFFFF" />
                        <!-- Iris (Green) -->
                        <circle cx="125" cy="100" r="10" fill="#81C784" />
                        <!-- Pupil -->
                        <circle cx="125" cy="100" r="6" fill="#1A252F" />
                        <!-- Catchlight (Eye shine) -->
                        <circle cx="128" cy="97" r="3" fill="#FFFFFF" />
                    </g>

                    <!-- Right Eye Group -->
                    <g class="eye-right">
                        <!-- Eye Whites -->
                        <circle cx="175" cy="100" r="12" fill="#FFFFFF" />
                        <!-- Iris (Green) -->
                        <circle cx="175" cy="100" r="10" fill="#81C784" />
                        <!-- Pupil -->
                        <circle cx="175" cy="100" r="6" fill="#1A252F" />
                        <!-- Catchlight (Eye shine) -->
                        <circle cx="178" cy="97" r="3" fill="#FFFFFF" />
                    </g>

                    <!-- Muzzle (Cheeks) -->
                    <ellipse cx="140" cy="122" rx="12" ry="9" fill="#FFF3E0" />
                    <ellipse cx="160" cy="122" rx="12" ry="9" fill="#FFF3E0" />
                    
                    <!-- Nose -->
                    <polygon points="145,115 155,115 150,122" fill="#FF8A80" />
                    
                    <!-- Mouth line dropping from nose -->
                    <line x1="150" y1="122" x2="150" y2="127" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    <!-- Little chin -->
                    <ellipse cx="150" cy="130" rx="5" ry="4" fill="#FFE4B5" />

                    <!-- Whiskers Left -->
                    <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" class="whisker">
                        <line x1="130" y1="120" x2="70" y2="112" />
                        <line x1="128" y1="124" x2="65" y2="124" />
                        <line x1="130" y1="128" x2="70" y2="136" />
                    </g>

                    <!-- Whiskers Right -->
                    <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" class="whisker">
                        <line x1="170" y1="120" x2="230" y2="112" />
                        <line x1="172" y1="124" x2="235" y2="124" />
                        <line x1="170" y1="128" x2="230" y2="136" />
                    </g>


                    <!-- ================= FRONT PAWS ================= -->
                    <!-- Left Front Paw -->
                    <ellipse cx="130" cy="245" rx="14" ry="10" fill="#FF9A00" />
                    <!-- Toe lines -->
                    <line x1="125" y1="252" x2="125" y2="242" stroke="#D35400" stroke-width="2" stroke-linecap="round"/>
                    <line x1="135" y1="252" x2="135" y2="242" stroke="#D35400" stroke-width="2" stroke-linecap="round"/>

                    <!-- Right Front Paw -->
                <ellipse cx="170" cy="245" rx="14" ry="10" fill="#FF9A00" />
                <!-- Toe lines -->
                <line x1="165" y1="252" x2="165" y2="242" stroke="#D35400" stroke-width="2" stroke-linecap="round"/>
                <line x1="175" y1="252" x2="175" y2="242" stroke="#D35400" stroke-width="2" stroke-linecap="round"/>

            </g>
        </svg>