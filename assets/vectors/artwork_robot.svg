<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
        
        <!-- Definitions for Gradients and Filters -->
        <defs>
            <!-- Light Metal Body Gradient -->
            <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e2e8f0" />
                <stop offset="50%" stop-color="#94a3b8" />
                <stop offset="100%" stop-color="#475569" />
            </linearGradient>

            <!-- Dark Metal Gradient for joints/accents -->
            <linearGradient id="darkMetalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#334155" />
                <stop offset="100%" stop-color="#0f172a" />
            </linearGradient>

            <!-- Accent Metal (Orange/Copper) -->
            <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f59e0b" />
                <stop offset="100%" stop-color="#b45309" />
            </linearGradient>

            <!-- Thruster Flame Gradient -->
            <radialGradient id="flameGrad" cx="50%" cy="20%" r="80%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="30%" stop-color="#fde047" />
                <stop offset="70%" stop-color="#f97316" />
                <stop offset="100%" stop-color="#dc2626" stop-opacity="0" />
            </radialGradient>

            <!-- Inner Screen Glow -->
            <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#020617" />
                <stop offset="100%" stop-color="#0f172a" />
            </linearGradient>
            
            <!-- Neon Glow Filter -->
            <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- Floor Shadow (Stays on the ground while robot floats) -->
        <ellipse class="floor-shadow" cx="200" cy="480" rx="70" ry="12" fill="#000000" />

        <!-- Master Group for Hovering Animation -->
        <g class="robot-body">
            
            <!-- THRUSTER FLAME (Behind base) -->
            <!-- Curved path resembling a jet flame -->
            <path class="flame" d="M 175 375 C 175 440, 195 480, 200 480 C 205 480, 225 440, 225 375 Z" fill="url(#flameGrad)" />

            <!-- ANTENNA -->
            <!-- Base -->
            <path d="M 190 90 L 210 90 L 205 50 L 195 50 Z" fill="url(#darkMetalGrad)" />
            <rect x="198" y="30" width="4" height="25" fill="#94a3b8" />
            <!-- Glowing Tip -->
            <circle cx="200" cy="25" r="8" fill="#ec4899" class="glow" filter="url(#neonGlow)" />

            <!-- ARMS (Behind Body) -->
            <!-- Left Arm -->
            <path d="M 120 230 Q 60 270 80 340" fill="none" stroke="url(#darkMetalGrad)" stroke-width="20" stroke-linecap="round" />
            <!-- Right Arm -->
            <path d="M 280 230 Q 340 270 320 340" fill="none" stroke="url(#darkMetalGrad)" stroke-width="20" stroke-linecap="round" />
            
            <!-- CLAWS (Hands) -->
            <!-- Left Claw -->
            <path d="M 65 350 A 20 20 0 1 1 95 350" fill="none" stroke="url(#accentGrad)" stroke-width="10" stroke-linecap="round" />
            <!-- Right Claw -->
            <path d="M 305 350 A 20 20 0 1 1 335 350" fill="none" stroke="url(#accentGrad)" stroke-width="10" stroke-linecap="round" />

            <!-- BODY BASE (Thruster Nozzle) -->
            <path d="M 150 350 L 250 350 L 230 385 L 170 385 Z" fill="url(#darkMetalGrad)" />
            <rect x="160" y="340" width="80" height="15" rx="5" fill="url(#accentGrad)" />

            <!-- MAIN BODY / TORSO -->
            <rect x="120" y="190" width="160" height="160" rx="30" fill="url(#metalGrad)" stroke="#334155" stroke-width="4" />
            
            <!-- CHEST PLATE -->
            <rect x="135" y="205" width="130" height="130" rx="20" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
            
            <!-- CHEST SCREEN -->
            <rect x="150" y="225" width="100" height="60" rx="10" fill="url(#screenGrad)" stroke="#334155" stroke-width="3" />
            <!-- Chest Screen Waveform (Animated) -->
            <path class="wave-line glow" d="M 155 255 Q 165 230 175 255 T 195 255 T 215 255 T 235 255 T 245 255" fill="none" stroke="#00ffcc" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" />
            
            <!-- Body Accents / Rivets -->
            <circle cx="150" cy="315" r="4" fill="#94a3b8" />
            <circle cx="250" cy="315" r="4" fill="#94a3b8" />
            <line x1="170" y1="315" x2="230" y2="315" stroke="url(#darkMetalGrad)" stroke-width="4" stroke-linecap="round" />
            <line x1="180" y1="325" x2="220" y2="325" stroke="url(#darkMetalGrad)" stroke-width="4" stroke-linecap="round" />

            <!-- SHOULDERS -->
            <circle cx="120" cy="230" r="25" fill="url(#accentGrad)" />
            <circle cx="120" cy="230" r="12" fill="url(#darkMetalGrad)" />
            <circle cx="280" cy="230" r="25" fill="url(#accentGrad)" />
            <circle cx="280" cy="230" r="12" fill="url(#darkMetalGrad)" />

            <!-- NECK -->
            <rect x="180" y="170" width="40" height="25" fill="url(#darkMetalGrad)" />
            <!-- Neck rings -->
            <line x1="180" y1="178" x2="220" y2="178" stroke="#475569" stroke-width="2" />
            <line x1="180" y1="186" x2="220" y2="186" stroke="#475569" stroke-width="2" />

            <!-- HEAD -->
            <rect x="130" y="80" width="140" height="100" rx="25" fill="url(#metalGrad)" stroke="#334155" stroke-width="4" />
            <!-- Head Side Nodes (Ears) -->
            <rect x="115" y="110" width="15" height="40" rx="5" fill="url(#accentGrad)" />
            <rect x="270" y="110" width="15" height="40" rx="5" fill="url(#accentGrad)" />

            <!-- FACE / VISOR -->
            <rect x="145" y="95" width="110" height="70" rx="15" fill="url(#screenGrad)" />
            
            <!-- EYES AND EXPRESSION -->
            <g class="eyes">
                <!-- Glowing Eyes -->
                <circle cx="175" cy="125" r="12" fill="#00ffcc" class="glow" filter="url(#neonGlow)" />
                <circle cx="225" cy="125" r="12" fill="#00ffcc" class="glow" filter="url(#neonGlow)" />
                
                <!-- Eye "Glints" for cuteness -->
                <circle cx="171" cy="121" r="4" fill="#ffffff" />
                <circle cx="221" cy="121" r="4" fill="#ffffff" />
            </g>

            <!-- MOUTH / SMILE -->
            <path d="M 175 145 Q 200 160 225 145" fill="none" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" class="glow" filter="url(#neonGlow)" />
            
        </g>
    </svg>