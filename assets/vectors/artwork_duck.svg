<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
    <!-- DEFINITIONS for High-Quality Vector Shading -->
    <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#FFEA75" />
            <stop offset="40%" stop-color="#FFD32A" />
            <stop offset="100%" stop-color="#F39C12" />
        </linearGradient>
        
        <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#D35400" stop-opacity="0" />
            <stop offset="100%" stop-color="#D35400" stop-opacity="0.25" />
        </linearGradient>
        
        <linearGradient id="beakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F1C40F" />
            <stop offset="100%" stop-color="#E67E22" />
        </linearGradient>
        
        <linearGradient id="footGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#E67E22" />
            <stop offset="100%" stop-color="#D35400" />
        </linearGradient>

        <linearGradient id="hatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#BDC3C7" />
        </linearGradient>

        <linearGradient id="bowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF4757" />
            <stop offset="100%" stop-color="#C0392B" />
        </linearGradient>
    </defs>

    <!-- FLOOR SHADOW -->
    <!-- Crisp vector shadow without heavy filters -->
    <ellipse cx="250" cy="450" rx="140" ry="18" fill="#D1D5DB" opacity="0.6"/>
    <ellipse cx="250" cy="450" rx="90" ry="10" fill="#9CA3AF" opacity="0.4"/>

    <!-- LEFT LEG & FOOT (Behind Body) -->
    <g transform="translate(180, 380)">
        <rect x="15" y="0" width="16" height="50" rx="8" fill="url(#footGrad)" />
        <path d="M -5 50 Q 8 35 23 35 Q 38 35 51 50 Q 23 60 -5 50 Z" fill="url(#footGrad)"/>
    </g>

    <!-- DUCK BODY (Continuous Smooth Vector Silhouette) -->
    <path d="M 120 270 
             C 90 340, 130 400, 250 400 
             C 360 400, 390 320, 360 220
             C 370 170, 350 110, 290 110
             C 230 110, 230 170, 260 210
             C 270 230, 170 250, 120 270 Z" 
          fill="url(#bodyGrad)" />

    <!-- Ambient / Core Shadow for 3D depth -->
    <path d="M 120 270 C 90 340, 130 400, 250 400 C 360 400, 390 320, 360 220 C 380 320, 300 400, 230 400 C 140 400, 110 320, 140 260 Z" fill="url(#shadowGrad)" />

    <!-- Edge Highlight (Rim Lighting) -->
    <path d="M 130 275 C 170 255, 260 240, 250 220 C 240 180, 240 120, 290 120 C 330 120, 350 160, 345 200" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

    <!-- RIGHT LEG & FOOT (In Front of Body) -->
    <g transform="translate(260, 385)">
        <rect x="0" y="0" width="16" height="50" rx="8" fill="url(#footGrad)" />
        <!-- Rounded Foot Flap -->
        <path d="M -20 50 Q -7 35 8 35 Q 23 35 36 50 Q 8 60 -20 50 Z" fill="url(#footGrad)"/>
        <!-- Foot Highlight -->
        <path d="M -15 50 Q -7 42 8 42 Q 15 42 25 48" fill="none" stroke="#F39C12" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    </g>

    <!-- WING -->
    <g transform="translate(170, 240)">
        <path d="M 10 30 C 80 10, 120 80, 70 120 C 20 150, -30 90, 10 30 Z" fill="url(#bodyGrad)" />
        <path d="M 10 30 C 80 10, 120 80, 70 120 C 20 150, -30 90, 10 30 Z" fill="url(#shadowGrad)" opacity="0.5"/>
        
        <!-- Wing Feathers & Gloss -->
        <path d="M 20 40 C 70 25, 95 75, 65 105" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
        <path d="M 40 60 Q 70 55, 85 80" fill="none" stroke="#D35400" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
        <path d="M 35 80 Q 65 80, 75 95" fill="none" stroke="#D35400" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- CLASSIC RED BOW TIE -->
    <g transform="translate(290, 230) rotate(-10)">
        <path d="M 0 0 L -30 -20 C -45 -10, -45 10, -30 20 Z" fill="url(#bowGrad)" />
        <path d="M 0 0 L 30 -20 C 45 -10, 45 10, 30 20 Z" fill="url(#bowGrad)" />
        <circle cx="0" cy="0" r="10" fill="#E74C3C" />
        
        <!-- Bow Tie Folds/Highlights -->
        <path d="M -25 -5 Q -10 -2 0 0" fill="none" stroke="#FF9FB3" stroke-width="4" stroke-linecap="round"/>
        <path d="M 25 -5 Q 10 -2 0 0" fill="none" stroke="#FF9FB3" stroke-width="4" stroke-linecap="round"/>
        <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <!-- FACE -->
    <g transform="translate(300, 145)">
        <!-- Richer Blush -->
        <ellipse cx="35" cy="35" rx="14" ry="9" fill="#FF789F" opacity="0.6" />
        <ellipse cx="-40" cy="45" rx="12" ry="8" fill="#FF789F" opacity="0.4" />

        <!-- Deep Expressive Eye -->
        <ellipse cx="15" cy="5" rx="13" ry="15" fill="#2C3E50" />
        <!-- Reflective Twins (Catchlights) -->
        <circle cx="10" cy="-2" r="5" fill="#FFFFFF" />
        <circle cx="20" cy="12" r="2" fill="#FFFFFF" />
        <!-- Bottom Eyeline / Iris Glow -->
        <path d="M 12 2 Q 16 2 18 5" fill="none" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" opacity="0.8"/> 

        <!-- CUTE PLUMP BEAK -->
        <g transform="translate(40, 15)">
            <!-- Bottom Jaw (Smile) -->
            <path d="M -5 5 Q 40 5 45 25 Q 40 45 -10 25 Z" fill="#E67E22" />
            <!-- Inner Mouth -->
            <path d="M -5 20 Q 30 35 45 25 Q 40 45 10 30 Z" fill="#C0392B" />
            <!-- Little Tongue -->
            <path d="M 12 28 Q 25 25 35 32 Q 25 38 12 28 Z" fill="#FF789F" />

            <!-- Top Bill -->
            <path d="M -15 0 Q 55 -15 65 10 Q 55 25 0 15 Z" fill="url(#beakGrad)" />
            
            <!-- Beak Specular Highlight -->
            <path d="M -5 3 Q 45 -5 50 10" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.6" />
            <!-- Subtle Nostril Details -->
            <ellipse cx="25" cy="2" rx="2" ry="1.5" fill="#D35400" opacity="0.5" />
            <!-- Smile Crease -->
            <path d="M -2 15 Q 20 18 45 10" stroke="#D35400" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
        </g>
    </g>

    <!-- SAILOR HAT (Cute Graphic Element) -->
    <g transform="translate(295, 105) rotate(15)">
        <!-- Back Rim -->
        <path d="M -25 0 Q 0 -12 25 0 Q 0 10 -25 0 Z" fill="#BDC3C7" />
        <!-- Top Puff -->
        <path d="M -20 0 C -20 -35, 20 -35, 20 0 Z" fill="url(#hatGrad)" />
        <!-- Blue Ribbon Strip -->
        <path d="M -20 -5 Q 0 -2 20 -5 L 20 0 Q 0 5 -20 0 Z" fill="#3498DB" />
        <!-- Front Rim -->
        <path d="M -27 0 Q 0 15 27 0 Q 0 5 -27 0 Z" fill="#FFFFFF" />
        <path d="M -25 0 Q 0 12 25 0" fill="none" stroke="#ECF0F1" stroke-width="2" />
    </g>

    <!-- LITTLE HEARTS (Charm detailing) -->
    <g transform="translate(160, 100) scale(0.7) rotate(-15)">
        <path d="M 0 15 C -20 -5, -40 10, -20 30 L 0 50 L 20 30 C 40 10, 20 -5, 0 15 Z" fill="#FF4757" opacity="0.8"/>
        <path d="M -15 15 C -15 5, -5 5, -2 10" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    </g>
</svg>