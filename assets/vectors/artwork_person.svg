<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="p_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A29BFE" />
      <stop offset="50%" stop-color="#6C5CE7" />
      <stop offset="100%" stop-color="#FD79A8" />
    </linearGradient>
    <linearGradient id="p_skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFDAC1" />
      <stop offset="100%" stop-color="#F2AA84" />
    </linearGradient>
    <linearGradient id="p_hoodie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDCB6E" />
      <stop offset="100%" stop-color="#E17055" />
    </linearGradient>
    <radialGradient id="p_face_light" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFDAC1" />
      <stop offset="100%" stop-color="#F2AA84" />
    </radialGradient>
    <clipPath id="p_circleClip">
      <circle cx="200" cy="200" r="192" />
    </clipPath>
    <filter id="p_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000022" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="192" fill="url(#p_bg)" />

  <!-- Subtle background pattern -->
  <g clip-path="url(#p_circleClip)" opacity="0.12">
    <circle cx="60" cy="80"  r="28" fill="#fff" />
    <circle cx="340" cy="60" r="20" fill="#fff" />
    <circle cx="50"  cy="310" r="18" fill="#fff" />
    <circle cx="355" cy="290" r="32" fill="#fff" />
    <rect x="310" y="130" width="20" height="20" rx="5" transform="rotate(45 320 140)" fill="#fff" />
    <rect x="55"  y="170" width="16" height="16" rx="4" transform="rotate(30 63 178)" fill="#fff" />
    <polygon points="200,18 212,38 188,38" fill="#fff" />
    <polygon points="340,330 355,355 325,355" fill="#fff" />
  </g>

  <g clip-path="url(#p_circleClip)">

    <!-- BODY / HOODIE -->
    <path d="M 30 440 C 40 300 105 268 200 265 C 295 268 360 300 370 440 Z" fill="url(#p_hoodie)" />
    <!-- Hoodie shadow under collar -->
    <path d="M 155 265 L 200 315 L 245 265 Z" fill="#C0392B" opacity="0.4" />
    <!-- Undershirt -->
    <path d="M 170 265 L 200 298 L 230 265 Z" fill="#FFFFFF" />
    <!-- Zipper line -->
    <line x1="200" y1="315" x2="200" y2="440" stroke="#C0392B" stroke-width="3.5" stroke-linecap="round" />
    <!-- Pocket -->
    <rect x="155" y="330" width="90" height="55" rx="10" fill="#C0392B" opacity="0.25" />
    <rect x="155" y="330" width="90" height="55" rx="10" fill="none" stroke="#C0392B" stroke-width="2.5" opacity="0.5" />
    <!-- Drawstrings -->
    <line x1="180" y1="290" x2="176" y2="360" stroke="#fff" stroke-width="4" stroke-linecap="round" />
    <line x1="220" y1="290" x2="224" y2="360" stroke="#fff" stroke-width="4" stroke-linecap="round" />
    <circle cx="176" cy="365" r="5" fill="#FDCB6E" />
    <circle cx="224" cy="365" r="5" fill="#FDCB6E" />

    <!-- NECK -->
    <rect x="178" y="192" width="44" height="82" rx="14" fill="url(#p_skin)" />
    <ellipse cx="200" cy="270" rx="22" ry="8" fill="#D9896A" opacity="0.35" />

    <!-- EARS -->
    <circle cx="130" cy="165" r="19" fill="url(#p_skin)" />
    <circle cx="270" cy="165" r="19" fill="url(#p_skin)" />
    <path d="M 126 154 C 116 165 126 176 131 171" stroke="#D9896A" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 274 154 C 284 165 274 176 269 171" stroke="#D9896A" stroke-width="4" stroke-linecap="round" fill="none" />

    <!-- BACK HAIR -->
    <ellipse cx="200" cy="112" rx="88" ry="75" fill="#1A1A2E" />

    <!-- FACE -->
    <rect x="132" y="88" width="136" height="158" rx="62" fill="url(#p_face_light)" />

    <!-- FRONT HAIR -->
    <path d="M 118 128 C 138 148 168 152 200 126 C 232 100 262 132 282 140 C 282 78 246 52 200 52 C 154 52 118 78 118 128 Z" fill="#1A1A2E" />
    <!-- Hair shine highlights -->
    <path d="M 138 112 Q 156 128 174 106" stroke="#3D3D6B" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <path d="M 222 90 Q 244 112 264 106" stroke="#3D3D6B" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <!-- Hair texture strands -->
    <path d="M 165 62 Q 170 80 175 70" stroke="#3D3D6B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7" />
    <path d="M 225 58 Q 232 75 238 64" stroke="#3D3D6B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7" />

    <!-- EYEBROWS (arched) -->
    <path d="M 148 134 Q 162 126 176 133" stroke="#1A1A2E" stroke-width="5.5" stroke-linecap="round" fill="none" />
    <path d="M 224 134 Q 238 126 252 133" stroke="#1A1A2E" stroke-width="5.5" stroke-linecap="round" fill="none" />

    <!-- GLASSES frames -->
    <rect x="140" y="138" width="52" height="36" rx="11" fill="#FFFFFF" opacity="0.18" />
    <rect x="140" y="138" width="52" height="36" rx="11" fill="none" stroke="#1A1A2E" stroke-width="5" />
    <rect x="208" y="138" width="52" height="36" rx="11" fill="#FFFFFF" opacity="0.18" />
    <rect x="208" y="138" width="52" height="36" rx="11" fill="none" stroke="#1A1A2E" stroke-width="5" />
    <path d="M 192 155 L 208 155" stroke="#1A1A2E" stroke-width="5" stroke-linecap="round" />
    <path d="M 124 150 L 140 150" stroke="#1A1A2E" stroke-width="5" stroke-linecap="round" />
    <path d="M 260 150 L 276 150" stroke="#1A1A2E" stroke-width="5" stroke-linecap="round" />
    <!-- Glasses glare -->
    <path d="M 149 143 L 160 143 L 154 162 Z" fill="#fff" opacity="0.42" />
    <path d="M 217 143 L 228 143 L 222 162 Z" fill="#fff" opacity="0.42" />

    <!-- BLUSH -->
    <ellipse cx="152" cy="182" rx="14" ry="9" fill="#FF9FF3" opacity="0.45" />
    <ellipse cx="248" cy="182" rx="14" ry="9" fill="#FF9FF3" opacity="0.45" />

    <!-- EYES -->
    <circle cx="166" cy="156" r="9" fill="#1A1A2E" />
    <circle cx="234" cy="156" r="9" fill="#1A1A2E" />
    <circle cx="163" cy="153" r="3.5" fill="#fff" />
    <circle cx="231" cy="153" r="3.5" fill="#fff" />
    <circle cx="169" cy="158" r="1.5" fill="#fff" opacity="0.6" />
    <circle cx="237" cy="158" r="1.5" fill="#fff" opacity="0.6" />

    <!-- NOSE -->
    <path d="M 200 164 C 200 178 200 184 191 186" stroke="#D9896A" stroke-width="4.5" stroke-linecap="round" fill="none" />

    <!-- MOUTH -->
    <path d="M 178 205 Q 200 232 222 205" fill="#1A1A2E" stroke="#1A1A2E" stroke-width="2" stroke-linejoin="round" />
    <!-- Teeth -->
    <path d="M 180 205 Q 200 217 220 205" fill="#fff" />
    <!-- Tongue -->
    <path d="M 191 214 Q 200 228 209 214" fill="#FF7675" />
    <!-- Smile dimples -->
    <path d="M 170 200 Q 175 206 178 205" stroke="#D9896A" stroke-width="3" stroke-linecap="round" fill="none" />
    <path d="M 230 200 Q 225 206 222 205" stroke="#D9896A" stroke-width="3" stroke-linecap="round" fill="none" />

    <!-- Hair accessory - small star pin -->
    <polygon points="290,110 293,120 303,120 295,126 298,136 290,130 282,136 285,126 277,120 287,120" fill="#FDCB6E" opacity="0.9" transform="scale(0.55) translate(236,74)" />

  </g>
</svg>
