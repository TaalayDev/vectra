<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
        
        <!-- Definitions -->
        <defs>
            <!-- Penguin Body Gradient -->
            <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#334155" />
                <stop offset="100%" stop-color="#0f172a" />
            </linearGradient>

            <!-- Penguin Belly Gradient -->
            <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#cbd5e1" />
            </linearGradient>

            <!-- Beak/Feet Gradient -->
            <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fb923c" />
                <stop offset="100%" stop-color="#ea580c" />
            </linearGradient>

            <!-- Aurora Glow Filter -->
            <filter id="auroraGlow">
                <feGaussianBlur stdDeviation="10" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- Background & Atmosphere -->
        <!-- Northern Lights (Aurora) -->
        <path class="aurora" d="M 0 100 Q 100 50 200 120 T 400 80 L 400 0 L 0 0 Z" fill="#34d399" filter="url(#auroraGlow)" opacity="0.4" />
        <path class="aurora" d="M 0 150 Q 150 200 250 130 T 400 170 L 400 0 L 0 0 Z" fill="#818cf8" filter="url(#auroraGlow)" opacity="0.3" style="animation-delay: -4s;" />

        <!-- Icy Ground -->
        <path d="M -50 380 Q 200 350 450 380 L 450 500 L -50 500 Z" fill="#f1f5f9" />
        <path d="M -50 420 Q 200 390 450 420 L 450 500 L -50 500 Z" fill="#e2e8f0" />
        
        <!-- Penguin Drop Shadow -->
        <ellipse cx="200" cy="420" rx="90" ry="12" fill="#94a3b8" opacity="0.5" /> 

        <!-- The Penguin -->
        <!-- Back part of the scarf -->
        <path d="M 150 230 Q 200 250 250 230 L 240 210 Q 200 230 160 210 Z" fill="#991b1b" />

        <!-- Feet -->
        <ellipse cx="160" cy="415" rx="25" ry="12" fill="url(#orangeGrad)" />
        <ellipse cx="240" cy="415" rx="25" ry="12" fill="url(#orangeGrad)" />

        <!-- Animated Body Group -->
        <g class="body-group">
            <!-- Left Flipper (Behind body) -->
            <path class="flipper-l" d="M 130 250 Q 80 320 100 380 Q 130 350 145 280 Z" fill="url(#bodyGrad)" />
            
            <!-- Right Flipper (Behind body) -->
            <path class="flipper-r" d="M 270 250 Q 320 320 300 380 Q 270 350 255 280 Z" fill="url(#bodyGrad)" />

            <!-- Main Black Body/Head Oval -->
            <ellipse cx="200" cy="270" rx="85" ry="130" fill="url(#bodyGrad)" />

            <!-- White Belly -->
            <ellipse cx="200" cy="300" rx="65" ry="90" fill="url(#bellyGrad)" />
            
            <!-- White Face Mask -->
            <path d="M 200 155 C 150 155, 130 200, 150 230 C 170 260, 200 240, 200 240 C 200 240, 230 260, 250 230 C 270 200, 250 155, 200 155 Z" fill="#ffffff" />

            <!-- Eyes -->
            <g class="eyes">
                <!-- Left Eye -->
                <circle cx="175" cy="190" r="6" fill="#0f172a" />
                <circle cx="173" cy="188" r="2" fill="#ffffff" />
                <!-- Right Eye -->
                <circle cx="225" cy="190" r="6" fill="#0f172a" />
                <circle cx="223" cy="188" r="2" fill="#ffffff" />
                
                <!-- Cute rosy cheeks -->
                <ellipse cx="155" cy="205" rx="8" ry="4" fill="#fca5a5" opacity="0.6" />
                <ellipse cx="245" cy="205" rx="8" ry="4" fill="#fca5a5" opacity="0.6" />
            </g>

            <!-- Orange Beak -->
            <path d="M 185 205 Q 200 195 215 205 Q 200 230 185 205 Z" fill="url(#orangeGrad)" />

            <!-- Red Scarf (Front wrap) -->
            <path d="M 140 225 Q 200 245 260 225 L 255 245 Q 200 265 145 245 Z" fill="#ef4444" />
            
            <!-- Red Scarf (Dangling Tail) -->
            <g class="scarf-tail">
                <path d="M 230 235 Q 240 280 220 310 L 245 320 Q 260 280 250 235 Z" fill="#dc2626" />
                <!-- Scarf Fringes -->
                <line x1="220" y1="310" x2="225" y2="325" stroke="#ef4444" stroke-width="2" />
                <line x1="228" y1="313" x2="233" y2="328" stroke="#ef4444" stroke-width="2" />
                <line x1="236" y1="316" x2="241" y2="331" stroke="#ef4444" stroke-width="2" />
                <line x1="244" y1="319" x2="249" y2="334" stroke="#ef4444" stroke-width="2" />
            </g>
        </g>

        <!-- Falling Snow Particles -->
        <circle cx="50"  cy="-20" class="snow s1" />
        <circle cx="120" cy="-30" class="snow s2" />
        <circle cx="180" cy="-10" class="snow s3" />
        <circle cx="260" cy="-40" class="snow s4" />
        <circle cx="320" cy="-25" class="snow s5" />
        <circle cx="380" cy="-15" class="snow s6" />
        <circle cx="80"  cy="-50" class="snow s7" />
        <circle cx="220" cy="-35" class="snow s8" />

    </svg>