<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
        
        <!-- Definitions -->
        <defs>
            <!-- Space Suit Gradients -->
            <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#cbd5e1" />
            </linearGradient>

            <linearGradient id="suitDark" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e2e8f0" />
                <stop offset="100%" stop-color="#94a3b8" />
            </linearGradient>

            <!-- Visor Reflection Gradient -->
            <linearGradient id="visorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fde047" /> <!-- Gold -->
                <stop offset="40%" stop-color="#f97316" /> <!-- Orange -->
                <stop offset="80%" stop-color="#be123c" /> <!-- Deep Pink/Red -->
                <stop offset="100%" stop-color="#4c0519" /> <!-- Dark Space -->
            </linearGradient>

            <!-- Planet Gradient -->
            <radialGradient id="planetGrad" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#38bdf8" />
                <stop offset="60%" stop-color="#0284c7" />
                <stop offset="100%" stop-color="#082f49" />
            </radialGradient>

            <!-- Glow Filter -->
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- Background & Atmosphere -->
        
        <!-- Stars -->
        <circle cx="50"  cy="80"  r="2" fill="#ffffff" class="star s1" />
        <circle cx="120" cy="40"  r="1.5" fill="#ffffff" class="star s2" />
        <circle cx="340" cy="90"  r="2.5" fill="#ffffff" class="star s3" />
        <circle cx="280" cy="40"  r="1" fill="#ffffff" class="star s4" />
        <circle cx="80"  cy="200" r="1.5" fill="#ffffff" class="star s5" />
        <circle cx="370" cy="250" r="2" fill="#ffffff" class="star s6" />
        <circle cx="40"  cy="350" r="1" fill="#ffffff" class="star s7" />
        <circle cx="350" cy="150" r="1.5" fill="#ffffff" class="star s1" />
        <circle cx="150" cy="420" r="2" fill="#ffffff" class="star s2" />
        <circle cx="90"  cy="480" r="1.5" fill="#ffffff" class="star s3" />

        <!-- Distant Planet / Horizon -->
        <circle cx="380" cy="480" r="150" fill="url(#planetGrad)" opacity="0.8" />
        <!-- Atmosphere glow -->
        <path d="M 230 480 A 160 160 0 0 1 380 330" fill="none" stroke="#7dd3fc" stroke-width="4" filter="url(#glow)" opacity="0.6"/>

        <!-- The Astronaut -->
        <g class="astronaut">
            
            <!-- Life Support Tether -->
            <path class="tether" d="M -50 50 Q 80 80 140 180" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" />
            <path class="tether" d="M -50 50 Q 80 80 140 180" fill="none" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round" />

            <!-- Backpack / Life Support System -->
            <rect x="130" y="140" width="140" height="150" rx="20" fill="url(#suitDark)" />
            <rect x="140" y="150" width="120" height="130" rx="15" fill="#64748b" />
            <!-- Oxygen tanks -->
            <rect x="150" y="160" width="35" height="110" rx="10" fill="#f1f5f9" />
            <rect x="215" y="160" width="35" height="110" rx="10" fill="#f1f5f9" />

            <!-- Left Arm (Behind body) -->
            <g>
                <path d="M 160 200 L 125 215 L 120 245" fill="none" stroke="url(#suitDark)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="110" y1="205" x2="140" y2="225" stroke="#334155" stroke-width="6" stroke-linecap="round" /> <!-- Elbow joint -->
                <!-- Left Glove -->
                <circle cx="118" cy="255" r="16" fill="#0f172a" />
                <path d="M 106 255 A 12 12 0 0 0 130 255" fill="#3b82f6" />
            </g>

            <!-- Left Leg (Behind body) -->
            <g>
                <path d="M 175 280 L 155 325 L 165 365" fill="none" stroke="url(#suitDark)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="135" y1="315" x2="175" y2="335" stroke="#334155" stroke-width="8" stroke-linecap="round" /> <!-- Knee joint -->
                <!-- Left Boot -->
                <ellipse cx="165" cy="370" rx="24" ry="15" fill="#0f172a" />
                <ellipse cx="165" cy="375" rx="25" ry="10" fill="#1e293b" />
            </g>

            <!-- Main Torso -->
            <rect x="140" y="180" width="120" height="120" rx="35" fill="url(#suitGrad)" />
            
            <!-- Chest Control Panel -->
            <rect x="165" y="215" width="70" height="50" rx="8" fill="#1e293b" />
            <rect x="170" y="220" width="60" height="40" rx="5" fill="#334155" />
            <!-- Panel Buttons/Gauges -->
            <rect x="175" y="228" width="22" height="8" rx="3" fill="#38bdf8" />
            <circle cx="215" cy="232" r="4" fill="#22c55e" filter="url(#glow)"/>
            <circle cx="215" cy="246" r="4" fill="#ef4444" />
            <rect x="175" y="244" width="30" height="4" rx="2" fill="#94a3b8" />

            <!-- Torso Belt -->
            <rect x="140" y="280" width="120" height="15" rx="5" fill="#0f172a" />
            <rect x="190" y="275" width="20" height="25" rx="4" fill="#cbd5e1" />

            <!-- Right Leg (Front) -->
            <g class="leg-r">
                <path d="M 225 280 L 240 325 L 230 365" fill="none" stroke="url(#suitGrad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="220" y1="315" x2="260" y2="335" stroke="#334155" stroke-width="8" stroke-linecap="round" /> <!-- Knee joint -->
                <path d="M 237 290 L 245 315" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" /> <!-- Red stripe detail -->
                <!-- Right Boot -->
                <ellipse cx="230" cy="370" rx="24" ry="15" fill="#0f172a" />
                <ellipse cx="230" cy="375" rx="25" ry="10" fill="#1e293b" />
            </g>

            <!-- Neck Joint -->
            <ellipse cx="200" cy="180" rx="45" ry="15" fill="#ef4444" />
            <ellipse cx="200" cy="185" rx="45" ry="8" fill="#b91c1c" />

            <!-- Helmet Base -->
            <circle cx="200" cy="135" r="55" fill="url(#suitGrad)" />
            
            <!-- Helmet Visor -->
            <ellipse cx="200" cy="135" rx="44" ry="34" fill="#0f172a" />
            <ellipse cx="200" cy="135" rx="42" ry="32" fill="url(#visorGrad)" />
            
            <!-- Visor Reflections -->
            <!-- Curved highlight on the left -->
            <path d="M 165 135 A 35 25 0 0 1 200 108 A 30 20 0 0 0 168 145 Z" fill="#ffffff" opacity="0.6" />
            <!-- Little star glare -->
            <polygon points="225,120 227,125 232,127 227,129 225,134 223,129 218,127 223,125" fill="#ffffff" opacity="0.9" />

            <!-- Right Arm (Front, Waving/Holding Star) -->
            <g class="arm-r">
                <path d="M 240 200 L 275 170 L 295 130" fill="none" stroke="url(#suitGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="260" y1="155" x2="290" y2="185" stroke="#334155" stroke-width="6" stroke-linecap="round" /> <!-- Elbow joint -->
                
                <!-- Right Glove -->
                <circle cx="295" cy="130" r="16" fill="#0f172a" />
                <path d="M 283 130 A 12 12 0 0 1 307 130" fill="#ef4444" />

                <!-- Magical Star in Hand -->
                <polygon class="hand-star" points="305,100 308,108 316,110 310,115 312,123 305,118 298,123 300,115 294,110 302,108" fill="#fef08a" />
            </g>

        </g>
    </svg>